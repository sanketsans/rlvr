# Phase 0 — benchmark suite (greedy + best-of-n) across eval recipes
# Default model: Qwen2.5-0.5B-Instruct. Override paths via env: MODEL_PATH, OUT_ROOT

model: ${oc.env:MODEL_PATH,./models/Qwen2.5-0.5B-Instruct}
output_dir: ${oc.env:OUT_ROOT,./outputs}/benchmark_baseline

common:
  max_samples: null  # null = full recipe; set e.g. 100 for quick smoke test
  max_new_tokens: 512
  question_batch_size: 64
  dtype: bfloat16
  method: unbiased
  seed: 42

# Each entry runs all listed recipes with the given decoding setup.
# Add temperature variants later by duplicating an entry with a new name/T.
benchmarks:
  - name: greedy
    recipes: [aime_test, gsm8k_test]
    temperature: 0.0
    n_generations: 1
    k: [1]

  - name: pass_at_5
    recipes: [aime_test, gsm8k_test]
    temperature: 0.7
    n_generations: 5
    k: [1, 3, 5]

  - name: pass_at_16
    recipes: [aime_test, gsm8k_test]
    temperature: 0.7
    n_generations: 16
    k: [1, 8, 16]

logging:
  wandb:
    project: rlvr
    entity: ${oc.env:WANDB_ENTITY,null}
    name: qwen2.5-0.5b-instruct_benchmark_baseline
    tags: [phase0, benchmark, gsm8k, math, aime, qwen2.5-0.5b-instruct]
