# Phase 0 — Pass@K baseline (default model: Qwen2.5-0.5B-Instruct)

model: ${oc.env:MODEL_PATH,./models/Qwen2.5-0.5B-Instruct}
output_dir: ${oc.env:OUT_ROOT,./outputs}

dataset:
  name: gsm8k
  split: test
  max_samples: null # null

passk:
  k: [1, 3, 5]
  n_generations: 5
  temperature: 0.7
  max_new_tokens: 512
  dtype: bfloat16
  method: unbiased  # unbiased (standard) or first_k
  question_batch_size: 8  # prompts per forward pass; increase until GPU ~80-90%

logging:
  wandb:
    project: RLVR
    entity: ${oc.env:WANDB_ENTITY,null}
    name: qwen2.5-0.5b-instruct_rlvr_p0_passk_gsm8k_baseline
    tags: [phase0, passk, gsm8k, qwen2.5-0.5b-instruct]

seed: 42
