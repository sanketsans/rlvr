# SkyPilot: Phase 1 GRPO debug on GSM8K (Qwen3-4B-Instruct)
# Launch:
#   sky jobs launch skypilot/phase1_grpo_debug.yaml \
#     --env WANDB_API_KEY=$WANDB_API_KEY \
#     --env EXP_NAME=qwen3_rlvr_p1_grpo_gsm8k_debug

name: qwen3-rlvr-p1-debug

resources:
  infra: k8s/multiversecomputing.teleport.sh-research-dev-hyperpod-eus2
  cpus: 16+
  memory: 64+
  accelerators: H200:1

config:
  kubernetes:
    pod_config:
      metadata:
        labels:
          sapCode: AIRBUS.1.1
          kueue.x-k8s.io/queue-name: airbus.1.1
        annotations:
          kueue.x-k8s.io/podset-required-topology: kubernetes.io/hostname
      spec:
        tolerations:
          - key: node-pool
            operator: Equal
            value: gpu-nvidia-h200
            effect: NoSchedule
          - key: workload-type
            operator: Equal
            value: kueue
            effect: NoSchedule

volumes:
  /workspace:
    name: fsx-eus2-volume

envs:
  RLVR_ROOT: /workspace/sanketthakur/Projects/qwen3_rlvr
  MODEL_PATH: /workspace/sanketthakur/Projects/qwen3_rlvr/models/Qwen3-4B-Instruct
  OUT_ROOT: /workspace/sanketthakur/Projects/qwen3_rlvr/outputs
  HF_HOME: /workspace/sanketthakur/Projects/qwen3_rlvr/.cache/huggingface
  EXP_NAME: qwen3_rlvr_p1_grpo_gsm8k_debug
  WANDB_PROJECT: qwen3-rlvr
  OMP_NUM_THREADS: 8

setup: |
  set -euo pipefail
  nvidia-smi

  if ! command -v conda &>/dev/null; then
    wget -q https://repo.anaconda.com/miniconda/Miniconda3-latest-Linux-x86_64.sh -O /tmp/miniconda.sh
    bash /tmp/miniconda.sh -b -p "${HOME}/miniconda3"
    eval "$("${HOME}/miniconda3/bin/conda" shell.bash hook)"
    conda create -y -n olmo python=3.11
  else
    eval "$(conda shell.bash hook)"
  fi
  conda activate olmo

  pip install --upgrade pip
  pip install -e "${RLVR_ROOT}/.[eval]"

  # Download model if not on FSx yet
  if [[ ! -f "${MODEL_PATH}/config.json" ]]; then
    bash "${RLVR_ROOT}/scripts/download_model.sh"
  fi

run: |
  set -euo pipefail
  eval "$(conda shell.bash hook)"
  conda activate olmo

  export OUT_ROOT="${OUT_ROOT}/${EXP_NAME}"
  mkdir -p "${OUT_ROOT}"

  cd "${RLVR_ROOT}"
  torchrun --nproc_per_node=1 scripts/train_grpo.py \
    --config configs/phase1_gsm8k_grpo_debug.yaml \
    --override logging.wandb.name="${EXP_NAME}" \
    --override output_dir="${OUT_ROOT}" \
    --override model="${MODEL_PATH}"

  echo "Done. Outputs: ${OUT_ROOT}"
